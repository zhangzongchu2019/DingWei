# WorkPulse nginx reverse proxy snippet.
# Replace server_name / ssl_certificate in your outer server block. Do not put
# real domains, certificates, or secrets in this repository.
#
# Expected public prefix:
#   https://YOUR_DOMAIN/dingwei/
#
# WorkPulse should listen on localhost, for example WP_ADDR=127.0.0.1:8791.

location /dingwei/ws/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://127.0.0.1:8791/ws/;
}

location /dingwei/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_pass http://127.0.0.1:8791/;
    proxy_redirect / /dingwei/;

    # WorkPulse admin pages currently use absolute paths such as /admin.
    # Rewrite common HTML attributes so the UI works under this prefix.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'href="/' 'href="/dingwei/';
    sub_filter 'src="/' 'src="/dingwei/';
    sub_filter 'action="/' 'action="/dingwei/';
}

location /schedule/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_pass http://127.0.0.1:8791/schedule/;
}
